<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI能源分析</title>
</head>
<body>

<h1>AI能源分析</h1>

<form method="post" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">上傳並分析</button>
</form>

{% if result %}
<h2>結果：</h2>
<p>總用電：{{ result.total }}</p>
<p>平均用電：{{ result.avg }}</p>
{% endif %}

{% if chart %}
<h2>圖表：</h2>
<img src="data:image/png;base64,{{ chart }}">
{% endif %}

</body>
</html>
