<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI能源分析（進階版）</title>
</head>
<body>

<h1>AI能源分析（AI進階版）</h1>

<form method="post" enctype="multipart/form-data">
    <input type="file" name="file" required><br><br>

    電費單價（元/度）：
    <input type="number" name="price" value="5" step="0.1"><br><br>

    <button type="submit">上傳並分析</button>
</form>

{% if result %}
<h2>結果：</h2>

{% if result.error %}
<p style="color:red;">錯誤：{{ result.error }}</p>
{% else %}
<p>總用電：{{ result.total }}</p>
<p>平均用電：{{ result.avg }}</p>
<p>預估電費：{{ result.cost }} 元</p>
<p>AI預測下一時段用電：{{ result.predicted }}</p>
{% endif %}

{% endif %}

{% if chart %}
<h2>圖表：</h2>
<img src="data:image/png;base64,{{ chart }}">
{% endif %}

</body>
</html>
